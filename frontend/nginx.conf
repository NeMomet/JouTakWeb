server {
    listen 8080;
    server_tokens off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Resource-Policy same-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: __JOUTAK_RUNTIME_CSP_API_ORIGIN__ https://cloud.joutak.ru; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' __JOUTAK_RUNTIME_CSP_API_ORIGIN__ __JOUTAK_RUNTIME_CSP_OTEL_ORIGIN__; frame-src https://forms.yandex.ru; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https://forms.yandex.ru" always;

    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, max-age=0" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    error_page 404 /index.html;
}
