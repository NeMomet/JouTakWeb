x-backend-environment: &backend-environment
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  DJANGO_SETTINGS_MODULE: backend.settings.prod

  DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
  DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
  DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
  FF_PROFILE_PERSONALIZATION_UI: "true"
  FF_PROFILE_PERSONALIZATION_INTERSTITIAL: "true"
  FF_PROFILE_PERSONALIZATION_ENFORCE: "false"
  USE_X_FORWARDED_PROTO: "false"
  SECURE_SSL_REDIRECT: "false"
  SECURE_HSTS_SECONDS: "0"

  SESSION_COOKIE_SAMESITE: "Lax"
  CSRF_COOKIE_SAMESITE: "Lax"
  SESSION_COOKIE_SECURE: "false"
  CSRF_COOKIE_SECURE: "false"

  DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,api.localhost,admin.localhost,joutak.localhost"
  DJANGO_ADMIN_HOSTS: "admin.localhost"
  DJANGO_API_HOSTS: "api.localhost"
  DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost,http://127.0.0.1,http://api.localhost,http://admin.localhost,http://joutak.localhost,http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080"
  CORS_ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1,http://joutak.localhost,http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080"
  FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
  DJANGO_ALLOW_LOCALHOST_FRONTEND_BASE_URL: "true"
  DJANGO_SITE_DOMAIN: ${DJANGO_SITE_DOMAIN:-}
  DJANGO_SITE_NAME: ${DJANGO_SITE_NAME:-}
  ACCOUNT_TRUST_PROXY_HEADERS: ${ACCOUNT_TRUST_PROXY_HEADERS:-true}
  ACCOUNT_TRUSTED_PROXY_CIDRS: ${ACCOUNT_TRUSTED_PROXY_CIDRS:-}
  MFA_ENCRYPTION_KEYS: ${MFA_ENCRYPTION_KEYS:-}
  AUTH_SESSION_RETENTION_DAYS: ${AUTH_SESSION_RETENTION_DAYS:-30}
  AUTH_TOKEN_RETENTION_DAYS: ${AUTH_TOKEN_RETENTION_DAYS:-30}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-joutak-backend}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:-}
  OTEL_METRICS_EXPORT_INTERVAL_MS: ${OTEL_METRICS_EXPORT_INTERVAL_MS:-60000}

  DB_SSL_REQUIRED: "False"
  DJANGO_CHECK_DEPLOY_STRICT: "0"
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}

services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./local-proxy.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - joutak_net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - joutak_net
  backend:
    #    image: ghcr.io/joutak/joutakweb-api:${BACKEND_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment: *backend-environment
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 30
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    networks:
      - joutak_net

  backend-maintenance:
    #    image: ghcr.io/joutak/joutakweb-api:${BACKEND_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app/backend
    entrypoint: ["/usr/bin/tini", "--"]
    command: ["python", "manage.py", "run_auth_maintenance"]
    environment: *backend-environment
    networks:
      - joutak_net

  frontend:
    #    image: ghcr.io/joutak/joutakweb:${FRONTEND_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    pull_policy: always
    environment:
      REACT_APP_API_URL: ${PUBLIC_API_URL:-http://127.0.0.1:8000}
      OTEL_SERVICE_NAME: ${FRONTEND_OTEL_SERVICE_NAME:-joutak-frontend}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${FRONTEND_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
    ports:
      - "8080:8080"
    networks:
      - joutak_net

networks:
  joutak_net:
    driver: bridge

volumes:
  postgres_data:
  media_data:
  static_data:
