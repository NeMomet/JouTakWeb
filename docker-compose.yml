x-backend-environment: &backend-environment
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  DJANGO_SETTINGS_MODULE: backend.settings.prod
  DB_SSL_REQUIRED: "False"

  USE_X_FORWARDED_PROTO: ${USE_X_FORWARDED_PROTO:-true}
  SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-true}
  SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-31536000}

  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS is required}
  DJANGO_ADMIN_HOSTS: ${DJANGO_ADMIN_HOSTS:-admin.localhost}
  DJANGO_API_HOSTS: ${DJANGO_API_HOSTS:-api.localhost}
  DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:?DJANGO_CSRF_TRUSTED_ORIGINS is required}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
  FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:?FRONTEND_BASE_URL is required}
  DJANGO_SITE_DOMAIN: ${DJANGO_SITE_DOMAIN:-}
  DJANGO_SITE_NAME: ${DJANGO_SITE_NAME:-}
  ACCOUNT_TRUST_PROXY_HEADERS: ${ACCOUNT_TRUST_PROXY_HEADERS:-true}
  ACCOUNT_TRUSTED_PROXY_CIDRS: ${ACCOUNT_TRUSTED_PROXY_CIDRS:-}
  MFA_ENCRYPTION_KEYS: ${MFA_ENCRYPTION_KEYS:-}
  AUTH_SESSION_RETENTION_DAYS: ${AUTH_SESSION_RETENTION_DAYS:-30}
  AUTH_TOKEN_RETENTION_DAYS: ${AUTH_TOKEN_RETENTION_DAYS:-30}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-joutak-backend}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:-}
  OTEL_METRICS_EXPORT_INTERVAL_MS: ${OTEL_METRICS_EXPORT_INTERVAL_MS:-60000}
  DJANGO_SYNC_SITE: ${DJANGO_SYNC_SITE:-1}
  DJANGO_SYNC_EMAIL_ADDRESSES: ${DJANGO_SYNC_EMAIL_ADDRESSES:-1}
  DJANGO_REENCRYPT_MFA_AUTHENTICATORS: ${DJANGO_REENCRYPT_MFA_AUTHENTICATORS:-1}

  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  EMAIL_USE_SSL: ${EMAIL_USE_SSL:-false}
  EMAIL_TIMEOUT: ${EMAIL_TIMEOUT:-10}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}

  DJANGO_MIGRATE: ${DJANGO_MIGRATE:-1}
  DJANGO_COLLECTSTATIC: ${DJANGO_COLLECTSTATIC:-1}
  DJANGO_CHECK_DEPLOY: ${DJANGO_CHECK_DEPLOY:-1}

  DJANGO_CHECK_DEPLOY_STRICT: "1"

services:
  traefik:
    image: traefik:v3.1
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - joutak_net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - joutak_net
    labels:
      - traefik.enable=false

  backend:
    image: ghcr.io/joutak/joutakweb-api:${BACKEND_TAG:-latest}
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    environment: *backend-environment
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 30
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    networks:
      - joutak_net
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend-api.rule=Host(`api.localhost`)
      - traefik.http.routers.backend-api.entrypoints=web
      - traefik.http.routers.backend-api.service=backend
      - traefik.http.routers.backend-admin.rule=Host(`admin.localhost`)
      - traefik.http.routers.backend-admin.entrypoints=web
      - traefik.http.routers.backend-admin.service=backend
      - traefik.http.services.backend.loadbalancer.server.port=8000

  backend-maintenance:
    image: ghcr.io/joutak/joutakweb-api:${BACKEND_TAG:-latest}
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app/backend
    entrypoint: ["/usr/bin/tini", "--"]
    command: ["python", "manage.py", "run_auth_maintenance"]
    environment: *backend-environment
    networks:
      - joutak_net

  frontend:
    image: ghcr.io/joutak/joutakweb:${FRONTEND_TAG:-latest}
    pull_policy: always
    environment:
      REACT_APP_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
      OTEL_SERVICE_NAME: ${FRONTEND_OTEL_SERVICE_NAME:-joutak-frontend}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${FRONTEND_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
    networks:
      - joutak_net
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`localhost`) || Host(`joutak.localhost`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.services.frontend.loadbalancer.server.port=8080

networks:
  joutak_net:
    driver: bridge

volumes:
  postgres_data:
  media_data:
  static_data:
