name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit_rules:
    name: Commit rules
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title and commit subjects
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          pattern='^(feat|fix|chore|refactor|docs|test|ci|build|perf|style|revert)\([a-z0-9._-]+\): .+'
          status=0

          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PR title must follow: type(scope): description"
            status=1
          fi

          while IFS= read -r subject; do
            if [[ "$subject" =~ ^Merge[[:space:]] ]] || [[ "$subject" =~ ^Revert\ \" ]] || [[ "$subject" =~ $pattern ]]; then
              continue
            fi
            echo "::error::Commit subject must follow: type(scope): description"
            echo "Invalid subject: $subject"
            status=1
          done < <(git log --format=%s "$BASE_SHA..$HEAD_SHA")

          exit "$status"

  frontend_checks_matrix:
    name: Frontend ${{ matrix.check_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - check_name: ESLint
            command: npm run lint
          - check_name: Prettier
            command: npm run format
          - check_name: Stylelint
            command: npm run lint:styles
          - check_name: Tests
            command: npm run test:run
          - check_name: Build
            command: npm run build
          - check_name: Audit
            command: npm audit --audit-level=moderate
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install deps
        run: npm ci

      - name: Run ${{ matrix.check_name }}
        run: ${{ matrix.command }}

  frontend_checks:
    runs-on: ubuntu-latest
    needs: frontend_checks_matrix
    if: always()
    steps:
      - name: Verify frontend matrix status
        run: |
          if [[ "${{ needs.frontend_checks_matrix.result }}" != "success" ]]; then
            echo "::error::Frontend checks did not complete successfully."
            exit 1
          fi

  backend_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync deps (with dev and test)
        run: uv sync --python 3.12 --group dev --group test

      - name: Ruff
        run: uv run ruff check .

      - name: Bandit
        run: >
          uv run bandit -r
          backend/accounts backend/core backend/backend
          backend/featureflags backend/observability
          -x "*/tests/*,*/migrations/*"
          --skip B104,B105

      - name: Frontend/OpenAPI contract check
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          DJANGO_SETTINGS_MODULE: backend.settings.dev
        run: uv run python scripts/check_frontend_openapi_contracts.py

      - name: pip-audit
        run: |
          uv export --frozen --no-dev --no-hashes -q -o /tmp/joutak-requirements.txt
          uv run pip-audit --no-deps -r /tmp/joutak-requirements.txt

      - name: Verify generated requirements
        run: |
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          uv export --frozen --no-dev --no-hashes -q -o "$tmp_dir/prod.txt"
          uv export --frozen --group dev --group test --no-hashes -q -o "$tmp_dir/dev.txt"
          uv export --frozen --no-default-groups --group test --no-hashes -q -o "$tmp_dir/test.txt"

          diff -u <(tail -n +3 backend/requirements/prod.txt) <(tail -n +3 "$tmp_dir/prod.txt")
          diff -u <(tail -n +3 backend/requirements/dev.txt) <(tail -n +3 "$tmp_dir/dev.txt")
          diff -u <(tail -n +3 backend/requirements/test.txt) <(tail -n +3 "$tmp_dir/test.txt")

      - name: Backend tests (sqlite)
        env:
          PYTHONPATH: ${{ github.workspace }}
          DJANGO_SETTINGS_MODULE: backend.settings.prod
          DJANGO_SECRET_KEY: test-secret-key-change-me-please-very-long-1234567890
          DATABASE_URL: sqlite:///./testdb.sqlite3
          FRONTEND_BASE_URL: https://joutak.ru
          DB_SSL_REQUIRED: "false"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api.joutak.ru,admin.joutak.ru,api.localhost,admin.localhost
          DJANGO_ADMIN_HOSTS: admin.joutak.ru,admin.localhost
          DJANGO_API_HOSTS: api.joutak.ru,api.localhost
          DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1,http://api.localhost,http://admin.localhost,https://joutak.ru,https://api.joutak.ru,https://admin.joutak.ru
          CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1,https://joutak.ru
          USE_X_FORWARDED_PROTO: "false"
          SECURE_SSL_REDIRECT: "false"
          SECURE_HSTS_SECONDS: "0"
          SESSION_COOKIE_SECURE: "false"
          CSRF_COOKIE_SECURE: "false"
          SESSION_COOKIE_SAMESITE: "None"
          CSRF_COOKIE_SAMESITE: "None"
        run: |
          uv run python --version
          uv run python backend/manage.py check
          uv run pytest backend -q

  docker_checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Validate docker compose files
        env:
          POSTGRES_DB: ci_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          DJANGO_SECRET_KEY: ci-secret-key-please-change
          FRONTEND_BASE_URL: https://joutak.ru
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api.localhost,admin.localhost,api.joutak.ru,admin.joutak.ru
          DJANGO_ADMIN_HOSTS: admin.localhost,admin.joutak.ru
          DJANGO_API_HOSTS: api.localhost,api.joutak.ru
          DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1,http://api.localhost,http://admin.localhost,https://joutak.ru,https://api.joutak.ru,https://admin.joutak.ru
          CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
          PUBLIC_API_URL: http://api.localhost
        run: |
          docker compose -f docker-compose.yml config >/dev/null
          docker compose -f docker-compose.local.yml config >/dev/null
          cp .env.example .env.production
          docker compose -f stack.yml config >/dev/null
          rm -f .env.production

      - name: Build backend image
        run: |
          docker build -f ./backend/Dockerfile -t joutakweb-api:ci .

      - name: Build frontend image
        run: |
          docker build -f ./frontend/Dockerfile -t joutakweb:ci ./frontend

  smoke_stack:
    name: Smoke stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run smoke without OTEL endpoints
        env:
          POSTGRES_DB: smoke_db
          POSTGRES_USER: smoke_user
          POSTGRES_PASSWORD: smoke_password
          DJANGO_SECRET_KEY: smoke-secret-key-change
          FRONTEND_BASE_URL: http://localhost
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api.localhost,admin.localhost,joutak.localhost
          DJANGO_ADMIN_HOSTS: admin.localhost
          DJANGO_API_HOSTS: api.localhost
          DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1,http://api.localhost,http://admin.localhost,http://joutak.localhost
          CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1,http://joutak.localhost
          PUBLIC_API_URL: http://api.localhost
        run: |
          docker compose -f docker-compose.local.yml up -d --build
          uv run python scripts/smoke_stack.py

      - name: Restart stack with OTEL endpoints enabled
        env:
          POSTGRES_DB: smoke_db
          POSTGRES_USER: smoke_user
          POSTGRES_PASSWORD: smoke_password
          DJANGO_SECRET_KEY: smoke-secret-key-change
          FRONTEND_BASE_URL: http://localhost
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api.localhost,admin.localhost,joutak.localhost
          DJANGO_ADMIN_HOSTS: admin.localhost
          DJANGO_API_HOSTS: api.localhost
          DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1,http://api.localhost,http://admin.localhost,http://joutak.localhost
          CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1,http://joutak.localhost
          PUBLIC_API_URL: http://api.localhost
          OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:4318
          FRONTEND_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://127.0.0.1:4318/v1/traces
        run: |
          docker compose -f docker-compose.local.yml down -v
          docker compose -f docker-compose.local.yml up -d --build
          uv run python scripts/smoke_stack.py

      - name: Shutdown smoke stack
        if: always()
        env:
          POSTGRES_DB: smoke_db
          POSTGRES_USER: smoke_user
          POSTGRES_PASSWORD: smoke_password
          DJANGO_SECRET_KEY: smoke-secret-key-change
          FRONTEND_BASE_URL: http://localhost
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api.localhost,admin.localhost,joutak.localhost
          DJANGO_ADMIN_HOSTS: admin.localhost
          DJANGO_API_HOSTS: api.localhost
          DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1,http://api.localhost,http://admin.localhost,http://joutak.localhost
          CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1,http://joutak.localhost
          PUBLIC_API_URL: http://api.localhost
        run: docker compose -f docker-compose.local.yml down -v

  secret_scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
